<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>NXT Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #060a12; --card: #0d1321; --text: #f1f5f9; --muted: #94a3b8;
      --accent: #00d4ff; --border: rgba(0,212,255,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-family: Orbitron, sans-serif; font-size: 1.4rem; color: var(--accent); }
    .header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    .header a:hover { color: var(--accent); }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat strong { display: block; font-size: 2rem; color: var(--accent); }
    .stat span { font-size: 0.85rem; color: var(--muted); }
    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .btn { padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 0.85rem; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger:hover { border-color: #ef4444; color: #ef4444; }
    .enquiry { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .enquiry-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .enquiry-head h3 { font-size: 1rem; }
    .badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 50px; background: rgba(0,212,255,0.1); color: var(--accent); }
    .enquiry p { color: var(--muted); font-size: 0.9rem; margin-bottom: 6px; }
    .summary { margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.25); border-radius: 8px; white-space: pre-wrap; font-size: 0.85rem; line-height: 1.6; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .actions a { font-size: 0.82rem; color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header class="header">
    <h1><i class="fas fa-chart-line"></i> NXT Admin Dashboard</h1>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
  </header>
  <div class="container">
    <div class="stats">
      <div class="stat"><strong id="total-count">0</strong><span>Total Enquiries</span></div>
      <div class="stat"><strong id="today-count">0</strong><span>Today</span></div>
      <div class="stat"><strong id="week-count">0</strong><span>This Week</span></div>
    </div>
    <div class="toolbar">
      <button class="btn" id="refresh-btn"><i class="fas fa-sync"></i> Refresh</button>
      <button class="btn btn-danger" id="clear-btn"><i class="fas fa-trash"></i> Clear All</button>
    </div>
    <div id="enquiries-list"></div>
  </div>
  <script>
    const STORAGE_KEY = 'nxt_enquiries';
    function getEnquiries() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function render() {
      const list = getEnquiries();
      const container = document.getElementById('enquiries-list');
      const today = new Date().toDateString();
      const weekAgo = Date.now() - 7 * 86400000;
      document.getElementById('total-count').textContent = list.length;
      document.getElementById('today-count').textContent = list.filter(e => new Date(e.date).toDateString() === today).length;
      document.getElementById('week-count').textContent = list.filter(e => new Date(e.date).getTime() > weekAgo).length;
      if (!list.length) {
        container.innerHTML = '<div class="empty"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:12px;display:block;"></i>No enquiries yet. Submissions from the AI Assistant and forms will appear here.</div>';
        return;
      }
      container.innerHTML = list.slice().reverse().map(e => `
        <article class="enquiry">
          <div class="enquiry-head">
            <h3>${esc(e.name)} · ${esc(e.service || 'General')}</h3>
            <span class="badge">${new Date(e.date).toLocaleString()}</span>
          </div>
          <p><strong>Email:</strong> ${esc(e.email)}</p>
          <p><strong>Phone:</strong> ${esc(e.phone || '—')}</p>
          ${e.fileName ? `<p><strong>File:</strong> ${esc(e.fileName)}</p>` : ''}
          <div class="summary">${esc(e.summary || e.message || '')}</div>
          <div class="actions">
            <a href="mailto:${esc(e.email)}"><i class="fas fa-envelope"></i> Email</a>
            <a href="https://wa.me/918469640417?text=${encodeURIComponent('Re: ' + (e.service || 'Enquiry') + ' from ' + e.name)}" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
          </div>
        </article>
      `).join('');
    }
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
    document.getElementById('refresh-btn').addEventListener('click', render);
    document.getElementById('clear-btn').addEventListener('click', () => {
      if (confirm('Delete all enquiries?')) { localStorage.removeItem(STORAGE_KEY); render(); }
    });
    render();
    window.addEventListener('storage', render);
  </script>
</body>
</html>
